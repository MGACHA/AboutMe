<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mike Wazowski Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════
   THEME TOKENS
══════════════════════════════════════ */
:root {
  --rose:        #c97b65;
  --rose-hover:  #b56a55;
  --plum:        #9b78bb;
  --gold:        #b8935a;
  --transition:  background 0.35s, color 0.35s, border-color 0.35s;
}

[data-theme="dark"] {
  --bg:          #0f1017;
  --bg2:         #14161f;
  --bg3:         #191c28;
  --bg4:         #1f2233;
  --text:        #e8e4f0;
  --text-mid:    #9991b8;
  --text-dim:    #585278;
  --border:      rgba(155,120,187,0.16);
  --border-md:   rgba(201,123,101,0.28);
  --nav-bg:      rgba(15,16,23,0.94);
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --header-glow: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(155,120,187,0.14) 0%, transparent 65%),
                 radial-gradient(ellipse 35% 35% at 85% 85%, rgba(201,123,101,0.08) 0%, transparent 65%);
}

[data-theme="light"] {
  --bg:          #faf8f5;
  --bg2:         #f3f0eb;
  --bg3:         #edeae4;
  --bg4:         #e5e1d9;
  --text:        #0e0b1a;
  --text-mid:    #3a3355;
  --text-dim:    #6a6090;
  --border:      rgba(80,60,120,0.18);
  --border-md:   rgba(160,70,50,0.3);
  --nav-bg:      rgba(250,248,245,0.94);
  --shadow:      0 4px 24px rgba(0,0,0,0.08);
  --header-glow: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(155,120,187,0.09) 0%, transparent 65%),
                 radial-gradient(ellipse 35% 35% at 85% 85%, rgba(201,123,101,0.06) 0%, transparent 65%);
}

/* ══════════════════════════════════════
   BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.75;
  overflow-x: hidden;
  transition: var(--transition);
}

/* ══════════════════════════════════════
   TOP BAR (theme + language)
══════════════════════════════════════ */
.top-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
  padding: 12px 32px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}

/* Language flags */
.lang-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  cursor: pointer;
  line-height: 0;
  opacity: 0.5;
  transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
}

.lang-btn svg {
  border-radius: 2px;
  display: block;
}

.lang-btn:hover,
.lang-btn.active {
  opacity: 1;
  border-color: var(--border-md);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.lang-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

/* Theme toggle */
.theme-toggle {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-mid);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  letter-spacing: 0.02em;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  margin-left: 4px;
}

.theme-toggle:hover {
  border-color: var(--border-md);
  color: var(--text);
}

.theme-icon { font-size: 14px; }

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
header {
  position: relative;
  text-align: center;
  padding: 88px 40px 72px;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  transition: var(--transition);
}

header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--header-glow);
  pointer-events: none;
}

.pre-name {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--plum);
  margin-bottom: 18px;
  opacity: 0.8;
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(2.8rem, 7.5vw, 6rem);
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--text);
}

h1 .first { color: var(--rose); }

.tagline {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: clamp(0.85rem, 2vw, 1.05rem);
  color: var(--text-mid);
  margin-top: 18px;
  letter-spacing: 0.06em;
}

.divider-ornament {
  display: block;
  margin: 22px auto 0;
  color: var(--gold);
  font-size: 16px;
  letter-spacing: 16px;
  opacity: 0.45;
}

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: center;
  transition: var(--transition);
}

nav a {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  padding: 18px 28px;
  transition: color 0.2s;
  position: relative;
}

nav a::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%; right: 50%;
  height: 2px;
  background: var(--rose);
  border-radius: 1px;
  transition: left 0.25s, right 0.25s;
}

nav a:hover { color: var(--text); }
nav a:hover::after { left: 16%; right: 16%; }

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
main {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 32px 100px;
}

/* ══════════════════════════════════════
   SECTIONS
══════════════════════════════════════ */
section {
  padding: 68px 0;
  border-bottom: 1px solid var(--border);
}

.section-eyebrow {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
  opacity: 0.7;
}

h2 {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.7rem, 4vw, 2.4rem);
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 32px;
  letter-spacing: -0.01em;
}

h2 em { color: var(--rose); font-style: italic; }

/* ══════════════════════════════════════
   BIO
══════════════════════════════════════ */
.bio-inner {
  display: grid;
  grid-template-columns: 3px 1fr;
  gap: 0 28px;
}

.bio-rule {
  background: linear-gradient(to bottom, var(--rose), var(--plum));
  border-radius: 2px;
}

.bio-text p {
  font-size: 16px;
  color: var(--text);
  font-weight: 300;
  line-height: 1.85;
}

.bio-text p + p { margin-top: 14px; }

.bio-text a {
  color: var(--rose);
  text-decoration: none;
  border-bottom: 1px solid rgba(201,123,101,0.35);
  transition: border-color 0.2s;
}
.bio-text a:hover { border-color: var(--rose); }

/* ══════════════════════════════════════
   SOCIAL LINKS
══════════════════════════════════════ */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
  gap: 14px;
}

.link-card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 24px 22px 20px;
  text-decoration: none;
  color: var(--text);
  border-radius: 10px;
  transition: border-color 0.25s, transform 0.2s, background 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.link-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--rose), var(--plum));
  border-radius: 10px 10px 0 0;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.link-card:hover {
  border-color: var(--border-md);
  background: var(--bg4);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}

.link-card:hover::before { transform: scaleX(1); }

.link-platform {
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--plum);
  margin-bottom: 6px;
  display: block;
}

.link-handle {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--text-mid);
  display: block;
  margin-bottom: 16px;
}

.link-cta {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--rose);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: gap 0.2s;
}

.link-card:hover .link-cta { gap: 12px; }

/* ══════════════════════════════════════
   BLOG
══════════════════════════════════════ */
.blog-list { display: flex; flex-direction: column; }

.blog-post {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 20px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
  transition: padding-left 0.25s;
}

.blog-post:first-child { border-top: 1px solid var(--border); }
.blog-post:hover { padding-left: 10px; }

.post-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  transition: color 0.2s;
  line-height: 1.45;
}

.blog-post:hover .post-title { color: var(--rose); }

.post-tag {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--plum);
  border: 1px solid rgba(155,120,187,0.3);
  padding: 3px 10px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.blog-all-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 24px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s, gap 0.2s;
}

.blog-all-link:hover { color: var(--rose); gap: 14px; }

/* ══════════════════════════════════════
   HOBBIES
══════════════════════════════════════ */
.hobby-intro {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 18px;
  font-weight: 400;
  color: var(--text-mid);
  margin-bottom: 36px;
  line-height: 1.65;
}

.hobbies-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
  gap: 14px;
}

.hobby-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 28px 18px 24px;
  text-align: center;
  border-radius: 10px;
  transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
}

.hobby-card:hover {
  border-color: var(--border-md);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}

.hobby-emoji { font-size: 30px; display: block; margin-bottom: 12px; }

.hobby-name {
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--rose);
  display: block;
  margin-bottom: 7px;
}

.hobby-desc {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 300;
  font-style: italic;
  color: var(--text-mid);
  line-height: 1.55;
}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer {
  text-align: center;
  padding: 44px 24px;
  border-top: 1px solid var(--border);
  transition: var(--transition);
}

.footer-name {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.6rem;
  color: var(--text-mid);
  display: block;
  margin-bottom: 10px;
}

.footer-sub {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.footer-sub span { color: var(--gold); }

.footer-flags {
  font-size: 22px;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

.footer-flag-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  vertical-align: middle;
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 600px) {
  .top-bar { padding: 10px 16px; }
  header { padding: 60px 20px 52px; }
  nav a { padding: 14px 16px; font-size: 10px; }
  main { padding: 0 18px 64px; }
  section { padding: 48px 0; }
  .links-grid { grid-template-columns: 1fr 1fr; }
  .hobbies-grid { grid-template-columns: 1fr 1fr; }
  .blog-post { grid-template-columns: 1fr; gap: 6px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')" title="English" aria-label="Switch to English">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="28" height="14">
      <clipPath id="a"><path d="M0 0v30h60V0z"/></clipPath>
      <clipPath id="b"><path d="M30 15h30v15zv15H0zH0V0zV0h30z"/></clipPath>
      <g clip-path="url(#a)">
        <path d="M0 0v30h60V0z" fill="#012169"/>
        <path d="M0 0l60 30m0-30L0 30" stroke="#fff" stroke-width="6"/>
        <path d="M0 0l60 30m0-30L0 30" clip-path="url(#b)" stroke="#C8102E" stroke-width="4"/>
        <path d="M30 0v30M0 15h60" stroke="#fff" stroke-width="10"/>
        <path d="M30 0v30M0 15h60" stroke="#C8102E" stroke-width="6"/>
      </g>
    </svg>
  </button>
  <button class="lang-btn" id="btn-pl" onclick="setLang('pl')" title="Polski" aria-label="Switch to Polish">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="28" height="14">
      <rect width="60" height="15" fill="#fff"/>
      <rect y="15" width="60" height="15" fill="#DC143C"/>
    </svg>
  </button>
  <div class="lang-divider"></div>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span class="theme-icon" id="theme-icon">🌙</span>
    <span id="theme-label">Dark</span>
  </button>
</div>

<!-- HEADER -->
<header>
  <p class="pre-name" data-en="Welcome to my corner of the internet · Data, creativity & everything in between" data-pl="Witaj w moim zakątku internetu · Dane, kreatywność i wszystko pomiędzy">Welcome to my corner of the internet · Data, creativity & everything in between</p>
  <h1><span class="first">Mike</span> Wazowski Blog</h1>
  <p class="tagline" data-en="Data Enthusiast · Builder of Things · Digital Creator" data-pl="Entuzjastka danych · Twórca · Digital Creator">Data Enthusiast · Builder of Things · Digital Creator</p>
  <span class="divider-ornament">· · ·</span>
</header>

<!-- NAV -->
<nav>
  <a href="#about" data-en="About" data-pl="O mnie">About</a>
  <a href="#links" data-en="Links" data-pl="Linki">Links</a>
  <a href="#blog" data-en="Writing" data-pl="Artykuły">Writing</a>
  <a href="#hobbies" data-en="Hobbies" data-pl="Hobby">Hobbies</a>
</nav>

</script>

</body>
</html>
